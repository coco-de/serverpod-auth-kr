name: serverpod_auth_idp_kakao_flutter
description: >-
  Flutter client for the Kakao identity provider of the Serverpod auth IdP
  module. Provides a sign-in controller and a Kakao-branded sign-in button.
version: 0.1.0
repository: https://github.com/coco-de/serverpod-auth-kr

environment:
  sdk: ">=3.8.0 <4.0.0"
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  serverpod_flutter: ^3.4.0
  serverpod_auth_idp_flutter: ^3.4.8
  kakao_flutter_sdk_user: ^1.9.0

dev_dependencies:
  flutter_lints: ^4.0.0
