### A fully configured Kakao account to be used for logins.
class: KakaoAccount
serverOnly: true
table: serverpod_auth_idp_kakao_account
fields:
  id: UuidValue?, defaultPersist=random_v7

  ### The [AuthUser] this profile belongs to
  authUser: module:auth:AuthUser?, relation(onDelete=Cascade)

  ### The user identifier given by Kakao for this account.
  ###
  ### This is the stringified value of Kakao's numeric `id`.
  userIdentifier: String

  ### The email of the user, as received from Kakao.
  ###
  ### Logins all work through the [userIdentifier], but the email is retained
  ### for consolidation look-ups.
  ###
  ### Stored in lower-case.
  ###
  ### This may be null if the user did not consent to share their email.
  email: String?

  ### The time when this authentication was created.
  created: DateTime, defaultModel=now

indexes:
  serverpod_auth_kakao_account_user_identifier:
    fields: userIdentifier
    unique: true
